# Build the engine on macOS, Linux, and Windows for every push / PR.
# When a `v*` tag is pushed, attach the per-platform archives to a
# GitHub Release.
#
# Each runner needs `data/WACKI.EXE` at build time — its .rdata +
# .data sections get embedded into the binary by tools/embed-pe-data.
# The EXE is fetched at job start by the local ./.github/actions/
# fetch-wacki-exe composite action (one place, used by every job),
# from a URL provided via the `WACKI_EXE_URL` secret (a private server
# you own). Nothing copyrighted ends up in artifacts — the embedded
# slice table inside the engine binary is a transformation; the source
# bytes themselves are never re-uploaded.
#
# Each build statically links SDL2 (STATIC_SDL2=1) so the released
# artefacts have no runtime dependency on libSDL2 / SDL2.dll. The
# static SDL2 is built once per (OS, SDL2_VERSION) and cached.

name: build

on:
  push:
    # port/ps2 + port/android are included so the experimental ports (and the
    # shared build system they lean on) get CI on every push to the working
    # branch, not just at merge time.
    branches: [master, main, port/ps2, port/android]
    tags: ['v*']
  pull_request:
    branches: [master, main]
  workflow_dispatch:

env:
  SDL2_VERSION: 2.30.10        # SDL2 source tarball version

jobs:
  build:
    name: ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            label: macOS (arm64)
            artifact: wacki-macos-arm64
            archive_ext: tar.gz
          # macos-13 (last Intel-hosted runner) disabled: the pool is
          # tiny and jobs sit pending for >30 min, sometimes never get
          # picked up. The follow-up is a single universal binary built
          # on arm64 via `lipo`, not a second runner.
          # - os: macos-13
          #   label: macOS (x86_64)
          #   artifact: wacki-macos-x86_64
          #   archive_ext: tar.gz
          - os: ubuntu-latest
            label: Linux (x86_64)
            artifact: wacki-linux-x86_64
            archive_ext: tar.gz
          - os: windows-latest
            label: Windows (x86_64, MSYS2/mingw)
            artifact: wacki-windows-x86_64
            archive_ext: zip
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash

    steps:
      # fetch-depth: 0 so the "Resolve build version" step's `git describe
      # --tags` sees the release tag; the default shallow clone has no tags
      # and would yield a bare sha.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Resolve the version ONCE here, in the runner's default shell (Git
      # Bash on Windows), and export it for every later step. The Windows
      # build runs `make` inside the MSYS2/MINGW64 shell, which has no
      # `git` on PATH — base-devel doesn't ship it and MSYS2's minimal
      # PATH hides the runner's native git — so the Makefile's
      # `git describe` there silently falls back to "unknown", baking a
      # bogus version into the startup log + menu. Computing it here (the
      # same git that did the checkout, so no dubious-ownership trap) and
      # passing it via $GITHUB_ENV fixes Windows and keeps every platform
      # consistent: the Makefile's `WACKI_VERSION ?=` honours the env.
      - name: Resolve build version
        run: echo "WACKI_VERSION=$(git describe --tags --always --dirty)" >> "$GITHUB_ENV"

      # ---- Linux: install SDL2's build-time deps so the static SDL2 can
      #   embed its dlopen stubs against system libs (libasound,
      #   libpulse, libX11, libGL, etc. — present on any desktop Linux
      #   at runtime, so the binary stays portable).
      - name: Install SDL2 build deps (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake pkg-config \
            libasound2-dev libpulse-dev \
            libx11-dev libxext-dev libxrandr-dev libxcursor-dev \
            libxi-dev libxss-dev libxkbcommon-dev libwayland-dev \
            libdrm-dev libgbm-dev libgl1-mesa-dev libegl1-mesa-dev \
            libdbus-1-dev libudev-dev libibus-1.0-dev libsamplerate0-dev

      # ---- macOS: cmake for SDL2 build. Apple frameworks (Cocoa,
      #   CoreAudio, IOKit, etc.) are part of macOS itself — no install.
      - name: Install build deps (macOS)
        if: startsWith(matrix.os, 'macos')
        run: |
          brew install cmake

      # ---- Windows: MSYS2 ships static + dynamic SDL2 in a single
      #   package, so we skip the build-from-source step entirely.
      - name: Setup MSYS2 (Windows)
        if: matrix.os == 'windows-latest'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            base-devel
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-pkgconf
            mingw-w64-x86_64-SDL2
            zip

      # ---- cache the built static SDL2 across CI runs --------------
      - name: Cache static SDL2
        if: matrix.os != 'windows-latest'
        uses: actions/cache@v4
        id: sdl2-cache
        with:
          path: sdl2-install
          # Bump the suffix when changing the cmake flags below so
          # cached builds from older flag sets don't get reused.
          key: sdl2-static-${{ matrix.os }}-${{ env.SDL2_VERSION }}-sections

      - name: Build static SDL2 from source
        if: matrix.os != 'windows-latest' && steps.sdl2-cache.outputs.cache-hit != 'true'
        run: |
          curl -fsSL -o sdl2.tar.gz \
            "https://github.com/libsdl-org/SDL/releases/download/release-${SDL2_VERSION}/SDL2-${SDL2_VERSION}.tar.gz"
          tar xf sdl2.tar.gz
          cd SDL2-${SDL2_VERSION}
          # -ffunction-sections + -fdata-sections so the engine link
          # can drop individual unused SDL2 functions via
          # --gc-sections / -dead_strip. Without these flags the
          # linker can only drop whole .o files from the .a archive,
          # which leaves a lot of slack.
          cmake -B build -DCMAKE_BUILD_TYPE=Release \
                -DSDL_SHARED=OFF -DSDL_STATIC=ON \
                -DSDL_TEST=OFF \
                -DCMAKE_C_FLAGS="-Os -ffunction-sections -fdata-sections" \
                -DCMAKE_INSTALL_PREFIX="$GITHUB_WORKSPACE/sdl2-install"
          cmake --build build --parallel
          cmake --install build

      - name: Expose static sdl2-config (POSIX)
        if: matrix.os != 'windows-latest'
        run: |
          chmod +x "$GITHUB_WORKSPACE/sdl2-install/bin/sdl2-config"
          echo "$GITHUB_WORKSPACE/sdl2-install/bin" >> "$GITHUB_PATH"
          # Sanity check
          "$GITHUB_WORKSPACE/sdl2-install/bin/sdl2-config" --static-libs

      # ---- fetch the build-time data dependency --------------------
      - name: Fetch WACKI.EXE
        uses: ./.github/actions/fetch-wacki-exe
        with:
          url: ${{ secrets.WACKI_EXE_URL }}

      # ---- build + test --------------------------------------------
      - name: Build + test (POSIX, static SDL2)
        if: matrix.os != 'windows-latest'
        run: |
          make all STATIC_SDL2=1
          # Tests link the same way; cheap to verify here.
          make test STATIC_SDL2=1

      - name: Build + test (Windows, static SDL2)
        if: matrix.os == 'windows-latest'
        shell: msys2 {0}
        run: |
          make all STATIC_SDL2=1
          make test STATIC_SDL2=1

      # ---- smoke: confirm the binary actually boots --------------
      # Run the just-built engine headless for a few seconds with no
      # data present. The shared tools/smoke-runner.sh --boot-only mode
      # asserts the binary starts and exits cleanly (incl. the rc=1
      # "data root not found" path) without segfaulting, hanging, or
      # aborting on a static-init / SDL_Init failure. Catches linker
      # regressions + platform-init bugs that the logic-only unit tests
      # can't see. Linux only — fastest runner, cheapest signal.
      - name: Smoke (Linux only — binary boots cleanly)
        if: matrix.os == 'ubuntu-latest'
        run: |
          # Remove the data so the engine really does see "no data". The
          # embedded PE blob inside the binary still satisfies
          # PeLoaderRead — only the external Dane_*.dta lookup fails.
          rm -f data/WACKI.EXE
          rm -rf data/Dane_*.dta data/DANE_*.DTA
          tools/smoke-runner.sh --boot-only -d 5

      # ---- confirm zero external SDL2 dependency in the binary -----
      - name: Verify no dynamic SDL2 linkage (macOS)
        if: startsWith(matrix.os, 'macos')
        run: |
          ! otool -L dist/wacki | grep -q SDL2 \
            || (echo "::error::dist/wacki still links to SDL2 dynamically"; otool -L dist/wacki; exit 1)
          otool -L dist/wacki

      - name: Verify no dynamic SDL2 linkage (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          ! ldd dist/wacki | grep -qi SDL2 \
            || (echo "::error::dist/wacki still links to SDL2 dynamically"; ldd dist/wacki; exit 1)
          ldd dist/wacki

      - name: Verify no dynamic SDL2 linkage (Windows)
        if: matrix.os == 'windows-latest'
        shell: msys2 {0}
        run: |
          # objdump -p ... | grep "DLL Name" lists every dynamic DLL
          # the .exe imports. Look for SDL2.dll specifically.
          deps=$(objdump -p dist/wacki.exe | grep "DLL Name" | awk '{print $3}')
          echo "$deps"
          if echo "$deps" | grep -qi '^SDL2\.dll$'; then
              echo "::error::dist/wacki.exe still imports SDL2.dll"
              exit 1
          fi

      # ---- strip symbols + log final binary size -------------------
      # The link already runs with -ffunction-sections + --gc-sections
      # (Linux/mingw) / -dead_strip (macOS) + -flto + -Os, so most of
      # the slimming happened during the link. `strip` shaves the
      # remaining debug + symbol tables.
      - name: Strip symbols (POSIX)
        if: matrix.os != 'windows-latest'
        run: |
          bin=dist/wacki
          before=$(wc -c < "$bin" | tr -d ' ')
          if [ "${{ matrix.os }}" = "macos-latest" ] || [ "${{ matrix.os }}" = "macos-13" ]; then
              strip "$bin"
          else
              strip --strip-all "$bin"
          fi
          after=$(wc -c < "$bin" | tr -d ' ')
          printf '[size] dist/wacki: %s -> %s bytes\n' "$before" "$after"

      - name: Strip symbols (Windows)
        if: matrix.os == 'windows-latest'
        shell: msys2 {0}
        run: |
          bin=dist/wacki.exe
          before=$(wc -c < "$bin" | tr -d ' ')
          strip --strip-all "$bin"
          after=$(wc -c < "$bin" | tr -d ' ')
          printf '[size] dist/wacki.exe: %s -> %s bytes\n' "$before" "$after"

      # ---- package + upload ----------------------------------------
      - name: Package (POSIX)
        if: matrix.os != 'windows-latest'
        run: |
          mkdir -p staging
          if [ "${{ matrix.os }}" = "macos-latest" ] || [ "${{ matrix.os }}" = "macos-13" ]; then
              # macOS: ship a proper .app bundle so the user double-clicks
              # Wacki.app from Finder without seeing a Terminal window.
              # tools/pack-macos-app.sh produces the full
              # Wacki.app/Contents/{Info.plist,MacOS,Resources} tree with
              # the icon, launcher script, and an empty data/ folder for
              # the user's Dane_*.dta files (Resources/data/README.txt
              # explains where to drop them).
              ./tools/pack-macos-app.sh dist/wacki staging/Wacki.app
          else
              cp dist/wacki staging/
          fi
          cp README.md  staging/ 2>/dev/null || true
          tar czf "${{ matrix.artifact }}.tar.gz" -C staging .

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: msys2 {0}
        run: |
          mkdir -p staging
          cp dist/wacki.exe staging/
          cp README.md staging/ 2>/dev/null || true
          (cd staging && zip -r "../${{ matrix.artifact }}.zip" .)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.${{ matrix.archive_ext }}
          if-no-files-found: error

  # ---- Miyoo Mini Plus (and pin-compatible handhelds) -------------
  # Separate job because the build runs entirely inside the
  # union-miyoomini-toolchain Docker image — no host SDL2 build, no
  # per-OS conditionals to thread through the main matrix.
  miyoo:
    name: Miyoo Mini Plus (armv7l)
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      # fetch-depth: 0 so `git describe --tags` sees tags + full history;
      # the default shallow clone would bake a bare sha (or "unknown")
      # into the version string instead of the release tag.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch WACKI.EXE
        uses: ./.github/actions/fetch-wacki-exe
        with:
          url: ${{ secrets.WACKI_EXE_URL }}

      - name: Build engine (Docker / union-miyoomini-toolchain)
        # WACKI_STRIP=1 → build-miyoo.sh strips the release binary inside
        # the toolchain container (right cross `strip`), so no separate
        # strip step is needed here.
        env:
          WACKI_STRIP: 1
        run: |
          ./tools/build-miyoo.sh
          # Docker writes as root-in-container; on Linux runners that
          # leaves the workspace root-owned and the next non-docker
          # step can't create siblings under dist/. Reset ownership.
          sudo chown -R "$USER:$USER" dist src/embedded_wacki_pe.c 2>/dev/null || true

      - name: Log size
        run: ls -lh dist/wacki-miyoo

      - name: Package .pak
        run: ./tools/pack-miyoo.sh dist/wacki-miyoo.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wacki-miyoo
          path: dist/wacki-miyoo.zip
          if-no-files-found: error

  # ---- Anbernic & other PortMaster handhelds ----------------------
  # CROSS-compiles the engine inside a native amd64 Debian bullseye
  # container (broad glibc compatibility) using the Debian cross
  # toolchains + multiarch SDL2 -dev — NOT QEMU, so the compiler runs at
  # the runner's native speed. The two arches fan out across two runners
  # (matrix) and a follow-up job zips them together. SDL2 is linked
  # dynamically so the binaries pick up PortMaster's per-device libSDL2
  # at runtime.
  portmaster:
    name: PortMaster (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [aarch64, armhf]
    defaults:
      run:
        shell: bash
    steps:
      # fetch-depth: 0 so `git describe --tags` (run on the host by
      # build-portmaster.sh) resolves the release tag rather than a bare
      # sha from the default shallow clone.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch WACKI.EXE
        uses: ./.github/actions/fetch-wacki-exe
        with:
          url: ${{ secrets.WACKI_EXE_URL }}

      - name: Cross-build engine (${{ matrix.arch }})
        # WACKI_STRIP=1 → build-portmaster.sh strips the release ELF with
        # the matching cross strip inside the container.
        env:
          WACKI_STRIP: 1
        run: |
          ./tools/build-portmaster.sh ${{ matrix.arch }}
          # Docker writes as root-in-container; reset ownership so the
          # upload step (non-docker) can read under dist/.
          sudo chown -R "$USER:$USER" dist src/embedded_wacki_pe.c 2>/dev/null || true

      # Hand the bare ELF to the packaging job. Named per-arch so
      # download-artifact can merge both back into dist/portmaster/.
      - name: Upload per-arch ELF
        uses: actions/upload-artifact@v4
        with:
          name: portmaster-elf-${{ matrix.arch }}
          path: dist/portmaster/wacki.${{ matrix.arch }}
          if-no-files-found: error

  # ---- PortMaster: assemble the .zip ------------------------------
  # Pulls both per-arch ELFs from the matrix above and runs
  # pack-portmaster.sh to produce the installable Wacki.zip. Split from
  # the build so the two cross-compiles stay independent (one failing
  # arch doesn't block the other's signal).
  portmaster-package:
    name: PortMaster (package .zip)
    needs: portmaster
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download per-arch ELFs
        uses: actions/download-artifact@v4
        with:
          path: pm-elfs
          pattern: portmaster-elf-*
          merge-multiple: true

      - name: Stage ELFs into dist/portmaster
        run: |
          mkdir -p dist/portmaster
          mv pm-elfs/wacki.aarch64 pm-elfs/wacki.armhf dist/portmaster/
          chmod +x dist/portmaster/wacki.aarch64 dist/portmaster/wacki.armhf

      - name: Package PortMaster .zip
        run: ./tools/pack-portmaster.sh dist/wacki-portmaster.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wacki-portmaster
          path: dist/wacki-portmaster.zip
          if-no-files-found: error

  # ---- PlayStation 2 (EE / ps2dev) --------------------------------
  # Builds dist/wacki-ps2.elf inside the ps2dev Docker image and packages it
  # as wacki-ps2.zip (the boot ELF + a how-to-run README). Attached to the
  # GitHub Release like the handheld archives. Also keeps the port building on
  # every push to port/ps2 so a backend or Makefile change can't silently
  # break it.
  ps2:
    name: PlayStation 2 (EE)
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch WACKI.EXE
        uses: ./.github/actions/fetch-wacki-exe
        with:
          url: ${{ secrets.WACKI_EXE_URL }}

      - name: Build ELF (Docker / ps2dev)
        # WACKI_STRIP=1 → build-ps2.sh strips the release ELF; default
        # local builds keep symbols for PINE/PCSX2 debugging.
        env:
          WACKI_STRIP: 1
        run: |
          ./tools/build-ps2.sh
          sudo chown -R "$USER:$USER" dist src/embedded_wacki_pe.c 2>/dev/null || true

      - name: Package .zip
        run: ./tools/pack-ps2.sh dist/wacki-ps2.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wacki-ps2
          path: dist/wacki-ps2.zip
          if-no-files-found: error

  # ---- Android (SDL2 / Gradle + CMake-NDK) ------------------------
  # Builds the sideload debug APK. Unlike the handheld/PS2 jobs this isn't
  # Docker — GitHub's ubuntu runner already carries the Android SDK; we add
  # JDK 17, a pinned Gradle 8.7, and (via sdkmanager) the pinned NDK + CMake so
  # CI matches an Android Studio build. SDL2 comes from the git submodule
  # (submodules: recursive) and is built from source into libSDL2.so alongside
  # our libmain.so. The APK ships WITHOUT the game data — it imports the user's
  # Dane_*.dta on first run via SAF (see android/README.md).
  android:
    name: Android (debug APK)
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      # fetch-depth: 0 so CMake's `git describe` bakes the real version, not a
      # bare sha. submodules: recursive checks out app/jni/SDL — the native
      # build does add_subdirectory(SDL), so a missing submodule fails configure.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # Install cmdline-tools (puts sdkmanager on PATH — the preinstalled SDK
      # doesn't), accept licenses, and install the exact components
      # android/app/build.gradle pins (ndkVersion + cmake version) so CI matches
      # an Android Studio build.
      - name: Set up Android SDK + NDK + CMake
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 ndk;26.1.10909125 cmake;3.22.1'

      # Download a pinned Gradle (matches AGP 8.5.2's required 8.7+). We don't
      # use the runner's preinstalled Gradle (version drifts) and the wrapper
      # jar isn't committed, so fetching 8.7 here keeps CI deterministic.
      - name: Install Gradle 8.7
        run: |
          curl -fsSL -o /tmp/gradle.zip \
            https://services.gradle.org/distributions/gradle-8.7-bin.zip
          sudo unzip -q -d /opt /tmp/gradle.zip
          echo "/opt/gradle-8.7/bin" >> "$GITHUB_PATH"

      - name: Fetch WACKI.EXE
        uses: ./.github/actions/fetch-wacki-exe
        with:
          url: ${{ secrets.WACKI_EXE_URL }}

      # Generate the embedded PE blob with the HOST compiler via the canonical
      # Makefile rule (needs only cc + data/WACKI.EXE, no SDL2). The CMake build
      # then finds src/embedded_wacki_pe.c already present and skips its own
      # host-tool fallback.
      - name: Generate embedded WACKI.EXE blob
        run: make src/embedded_wacki_pe.c

      # Decode the release keystore from a secret, when configured. Absent on
      # forks / before the maintainer adds it → falls back to the debug build.
      - name: Decode release keystore (if configured)
        id: keystore
        env:
          KS_B64: ${{ secrets.WACKI_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KS_B64" ]; then
            echo "$KS_B64" | base64 -d > "$RUNNER_TEMP/wacki-release.jks"
            echo "have=true" >> "$GITHUB_OUTPUT"
          else
            echo "have=false" >> "$GITHUB_OUTPUT"
          fi

      # On a v* tag WITH a keystore → signed release APK (what ships). Otherwise
      # (branch pushes, or no keystore yet) → debug APK for testing. Either way
      # the result is staged as wacki-android.apk (one artifact, always present).
      - name: Build APK
        working-directory: android
        env:
          WACKI_KEYSTORE: ${{ steps.keystore.outputs.have == 'true' && format('{0}/wacki-release.jks', runner.temp) || '' }}
          WACKI_KEYSTORE_PASSWORD: ${{ secrets.WACKI_KEYSTORE_PASSWORD }}
          WACKI_KEY_ALIAS: ${{ secrets.WACKI_KEY_ALIAS }}
          WACKI_KEY_PASSWORD: ${{ secrets.WACKI_KEY_PASSWORD }}
        run: |
          is_tag=false
          case "$GITHUB_REF" in refs/tags/v*) is_tag=true;; esac
          if [ "$is_tag" = "true" ] && [ "${{ steps.keystore.outputs.have }}" = "true" ]; then
            echo "→ signed release APK"
            gradle --no-daemon assembleRelease --stacktrace
            out=app/build/outputs/apk/release/app-release.apk
          else
            echo "→ debug APK (no release keystore, or not a v* tag)"
            gradle --no-daemon assembleDebug --stacktrace
            out=app/build/outputs/apk/debug/app-debug.apk
          fi
          if [ ! -f "$out" ]; then
            echo "::error::APK not found at $out"; find . -name '*.apk'; exit 1
          fi
          cp "$out" "$GITHUB_WORKSPACE/wacki-android.apk"
          ls -lh "$GITHUB_WORKSPACE/wacki-android.apk"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wacki-android
          path: wacki-android.apk
          if-no-files-found: error

  # ---- release -----------------------------------------------------
  # Only fires on tag push (`v*`). Pulls the per-platform archives from the
  # matrix build + the Miyoo, PortMaster, PS2 and Android jobs and attaches
  # them to a GitHub Release named after the tag.
  release:
    name: GitHub Release
    needs: [build, miyoo, portmaster-package, ps2, android]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write          # to dispatch the Pages deploy (gh workflow run)
    steps:
      # Full history + every tag so tools/gen-changelog.sh can diff this
      # tag against its predecessor. Checkout MUST be the first step: a
      # checkout after download-artifact would `git clean` the workspace
      # and delete the archives we just pulled.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifact layout
        run: |
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' -o -name '*.apk' \) \
                -exec mv {} . \;
          ls -la wacki-*

      # GitHub's own generate_release_notes only summarises merged PRs —
      # this repo pushes straight to master, so it produced an empty
      # "Full Changelog" line. Build a changelog grouped by commit type
      # (feat/fix/docs/...) from the commits since the previous tag.
      - name: Generate changelog
        run: bash tools/gen-changelog.sh "${GITHUB_REF_NAME}" | tee RELEASE_NOTES.md

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            wacki-*.tar.gz
            wacki-*.zip
            wacki-*.apk
          body_path: RELEASE_NOTES.md
          fail_on_unmatched_files: true

      # Redeploy the Pages site so its version/date pick up this release.
      # We can't lean on pages.yml's `release: published` trigger: events
      # raised by this job's GITHUB_TOKEN don't cascade into other
      # workflows. workflow_dispatch is the documented exception, and we
      # target master because the github-pages environment's branch policy
      # only permits deploys from master (a tag-ref deploy is rejected).
      # The release exists by now, so pages.yml reads it as releases/latest.
      - name: Trigger Pages deploy
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run pages.yml --ref master
