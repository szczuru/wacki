# Build the engine on macOS, Linux, and Windows for every push / PR.
# When a `v*` tag is pushed, attach the per-platform archives to a
# GitHub Release.
#
# Each runner needs `data/WACKI.EXE` at build time — its .rdata +
# .data sections get embedded into the binary by tools/embed-pe-data.
# The EXE is fetched at job start from a URL provided via the
# `WACKI_EXE_URL` secret (a private server you own). The URL serves a
# ZIP holding WACKI.EXE; the fetch step extracts it (and still
# accepts a raw EXE via a magic-byte sniff). The fetched file lives
# only inside the runner's workspace; nothing copyrighted ends up in
# artifacts (the embedded slice table inside the engine binary is a
# transformation, but the source bytes themselves are never
# re-uploaded).
#
# Each build statically links SDL2 (STATIC_SDL2=1) so the released
# artefacts have no runtime dependency on libSDL2 / SDL2.dll. The
# static SDL2 is built once per (OS, SDL2_VERSION) and cached.

name: build

on:
  push:
    branches: [master, main]
    tags: ['v*']
  pull_request:
    branches: [master, main]
  workflow_dispatch:

env:
  SDL2_VERSION: 2.30.10        # SDL2 source tarball version

jobs:
  build:
    name: ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            label: macOS (arm64)
            artifact: wacki-macos-arm64
            archive_ext: tar.gz
          # macos-13 (last Intel-hosted runner) disabled: the pool is
          # tiny and jobs sit pending for >30 min, sometimes never get
          # picked up. The follow-up is a single universal binary built
          # on arm64 via `lipo`, not a second runner.
          # - os: macos-13
          #   label: macOS (x86_64)
          #   artifact: wacki-macos-x86_64
          #   archive_ext: tar.gz
          - os: ubuntu-latest
            label: Linux (x86_64)
            artifact: wacki-linux-x86_64
            archive_ext: tar.gz
          - os: windows-latest
            label: Windows (x86_64, MSYS2/mingw)
            artifact: wacki-windows-x86_64
            archive_ext: zip
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4

      # ---- Linux: install SDL2's build-time deps so the static SDL2 can
      #   embed its dlopen stubs against system libs (libasound,
      #   libpulse, libX11, libGL, etc. — present on any desktop Linux
      #   at runtime, so the binary stays portable).
      - name: Install SDL2 build deps (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake pkg-config \
            libasound2-dev libpulse-dev \
            libx11-dev libxext-dev libxrandr-dev libxcursor-dev \
            libxi-dev libxss-dev libxkbcommon-dev libwayland-dev \
            libdrm-dev libgbm-dev libgl1-mesa-dev libegl1-mesa-dev \
            libdbus-1-dev libudev-dev libibus-1.0-dev libsamplerate0-dev

      # ---- macOS: cmake for SDL2 build. Apple frameworks (Cocoa,
      #   CoreAudio, IOKit, etc.) are part of macOS itself — no install.
      - name: Install build deps (macOS)
        if: startsWith(matrix.os, 'macos')
        run: |
          brew install cmake

      # ---- Windows: MSYS2 ships static + dynamic SDL2 in a single
      #   package, so we skip the build-from-source step entirely.
      - name: Setup MSYS2 (Windows)
        if: matrix.os == 'windows-latest'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            base-devel
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-pkgconf
            mingw-w64-x86_64-SDL2
            zip

      # ---- cache the built static SDL2 across CI runs --------------
      - name: Cache static SDL2
        if: matrix.os != 'windows-latest'
        uses: actions/cache@v4
        id: sdl2-cache
        with:
          path: sdl2-install
          # Bump the suffix when changing the cmake flags below so
          # cached builds from older flag sets don't get reused.
          key: sdl2-static-${{ matrix.os }}-${{ env.SDL2_VERSION }}-sections

      - name: Build static SDL2 from source
        if: matrix.os != 'windows-latest' && steps.sdl2-cache.outputs.cache-hit != 'true'
        run: |
          curl -fsSL -o sdl2.tar.gz \
            "https://github.com/libsdl-org/SDL/releases/download/release-${SDL2_VERSION}/SDL2-${SDL2_VERSION}.tar.gz"
          tar xf sdl2.tar.gz
          cd SDL2-${SDL2_VERSION}
          # -ffunction-sections + -fdata-sections so the engine link
          # can drop individual unused SDL2 functions via
          # --gc-sections / -dead_strip. Without these flags the
          # linker can only drop whole .o files from the .a archive,
          # which leaves a lot of slack.
          cmake -B build -DCMAKE_BUILD_TYPE=Release \
                -DSDL_SHARED=OFF -DSDL_STATIC=ON \
                -DSDL_TEST=OFF \
                -DCMAKE_C_FLAGS="-Os -ffunction-sections -fdata-sections" \
                -DCMAKE_INSTALL_PREFIX="$GITHUB_WORKSPACE/sdl2-install"
          cmake --build build --parallel
          cmake --install build

      - name: Expose static sdl2-config (POSIX)
        if: matrix.os != 'windows-latest'
        run: |
          chmod +x "$GITHUB_WORKSPACE/sdl2-install/bin/sdl2-config"
          echo "$GITHUB_WORKSPACE/sdl2-install/bin" >> "$GITHUB_PATH"
          # Sanity check
          "$GITHUB_WORKSPACE/sdl2-install/bin/sdl2-config" --static-libs

      # ---- fetch the build-time data dependency --------------------
      - name: Fetch WACKI.EXE
        env:
          WACKI_EXE_URL: ${{ secrets.WACKI_EXE_URL }}
        run: |
          if [ -z "${WACKI_EXE_URL:-}" ]; then
            echo "::error::WACKI_EXE_URL secret is empty"
            exit 1
          fi
          mkdir -p data
          curl -fsSL --retry 3 --retry-delay 2 \
               "$WACKI_EXE_URL" -o data/_wacki_dl
          # The secret URL serves a ZIP containing WACKI.EXE. Sniff the
          # magic bytes (ZIP starts with "PK") and extract the EXE if so;
          # tolerate a raw EXE too in case the URL is ever switched back
          # to an unpacked file. unzip is present on the macOS + Linux
          # runners; 7z is the fallback for Windows Git Bash where unzip
          # isn't guaranteed.
          if [ "$(head -c 2 data/_wacki_dl)" = "PK" ]; then
            echo "[fetch] archive detected — extracting WACKI.EXE"
            mkdir -p data/_unzip
            if command -v unzip >/dev/null 2>&1; then
              unzip -o -q data/_wacki_dl -d data/_unzip
            elif command -v 7z >/dev/null 2>&1; then
              7z x -y -odata/_unzip data/_wacki_dl >/dev/null
            else
              echo "::error::no unzip / 7z available to extract the archive"
              exit 1
            fi
            exe=$(find data/_unzip -iname 'WACKI.EXE' | head -1)
            [ -n "$exe" ] || exe=$(find data/_unzip -iname '*.exe' | head -1)
            if [ -z "$exe" ]; then
              echo "::error::no .exe found inside the downloaded archive"
              find data/_unzip -type f
              exit 1
            fi
            cp "$exe" data/WACKI.EXE
            rm -rf data/_unzip data/_wacki_dl
          else
            mv data/_wacki_dl data/WACKI.EXE
          fi
          ls -la data/WACKI.EXE

      # ---- build + test --------------------------------------------
      - name: Build + test (POSIX, static SDL2)
        if: matrix.os != 'windows-latest'
        run: |
          make all STATIC_SDL2=1
          # Tests link the same way; cheap to verify here.
          make test STATIC_SDL2=1

      - name: Build + test (Windows, static SDL2)
        if: matrix.os == 'windows-latest'
        shell: msys2 {0}
        run: |
          make all STATIC_SDL2=1
          make test STATIC_SDL2=1

      # ---- smoke: confirm the binary actually boots --------------
      # Run the just-built engine headless for a few seconds with the
      # null SDL drivers. Without the Dane_*.dta archive the engine
      # logs a 'data root not found' error and exits cleanly — but
      # crucially without segfaulting, hanging, or aborting on a
      # static-init/SDL_Init failure. Catches linker regressions and
      # platform-init bugs that 'make test' (468 logic-only tests)
      # can't see. Linux only — fastest runner, cheapest signal.
      - name: Smoke (Linux only — binary boots cleanly)
        if: matrix.os == 'ubuntu-latest'
        run: |
          # Remove the WACKI.EXE we fetched earlier so the engine
          # really does see 'no data'. The embedded PE blob inside
          # the binary still satisfies PeLoaderRead — only the
          # external Dane_*.dta lookup fails.
          rm -f data/WACKI.EXE
          rm -rf data/Dane_*.dta data/DANE_*.DTA
          # 5 s budget. Accepted exit codes:
          #   0   — clean exit (somehow found data and ran)
          #   1   — clean "no data found" exit (expected here — main()
          #         returns 1 after FindDataRoot fails; --headless
          #         skips the GUI folder picker so it bails fast)
          #   124 — timeout killed it (made it into the main loop)
          # A real startup crash shows up as a signal code: 134
          # (SIGABRT / sanitizer), 139 (SIGSEGV), etc. — those fail.
          set +e
          timeout 5 ./dist/wacki --headless >smoke.log 2>&1
          rc=$?
          set -e
          echo "exit code: $rc"
          tail -20 smoke.log
          case "$rc" in
            0|1|124) echo "[smoke] OK (rc=$rc)" ;;
            *) echo "::error::engine crashed at startup (rc=$rc)"; exit 1 ;;
          esac

      # ---- confirm zero external SDL2 dependency in the binary -----
      - name: Verify no dynamic SDL2 linkage (macOS)
        if: startsWith(matrix.os, 'macos')
        run: |
          ! otool -L dist/wacki | grep -q SDL2 \
            || (echo "::error::dist/wacki still links to SDL2 dynamically"; otool -L dist/wacki; exit 1)
          otool -L dist/wacki

      - name: Verify no dynamic SDL2 linkage (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          ! ldd dist/wacki | grep -qi SDL2 \
            || (echo "::error::dist/wacki still links to SDL2 dynamically"; ldd dist/wacki; exit 1)
          ldd dist/wacki

      - name: Verify no dynamic SDL2 linkage (Windows)
        if: matrix.os == 'windows-latest'
        shell: msys2 {0}
        run: |
          # objdump -p ... | grep "DLL Name" lists every dynamic DLL
          # the .exe imports. Look for SDL2.dll specifically.
          deps=$(objdump -p dist/wacki.exe | grep "DLL Name" | awk '{print $3}')
          echo "$deps"
          if echo "$deps" | grep -qi '^SDL2\.dll$'; then
              echo "::error::dist/wacki.exe still imports SDL2.dll"
              exit 1
          fi

      # ---- strip symbols + log final binary size -------------------
      # The link already runs with -ffunction-sections + --gc-sections
      # (Linux/mingw) / -dead_strip (macOS) + -flto + -Os, so most of
      # the slimming happened during the link. `strip` shaves the
      # remaining debug + symbol tables.
      - name: Strip symbols (POSIX)
        if: matrix.os != 'windows-latest'
        run: |
          bin=dist/wacki
          before=$(wc -c < "$bin" | tr -d ' ')
          if [ "${{ matrix.os }}" = "macos-latest" ] || [ "${{ matrix.os }}" = "macos-13" ]; then
              strip "$bin"
          else
              strip --strip-all "$bin"
          fi
          after=$(wc -c < "$bin" | tr -d ' ')
          printf '[size] dist/wacki: %s -> %s bytes\n' "$before" "$after"

      - name: Strip symbols (Windows)
        if: matrix.os == 'windows-latest'
        shell: msys2 {0}
        run: |
          bin=dist/wacki.exe
          before=$(wc -c < "$bin" | tr -d ' ')
          strip --strip-all "$bin"
          after=$(wc -c < "$bin" | tr -d ' ')
          printf '[size] dist/wacki.exe: %s -> %s bytes\n' "$before" "$after"

      # ---- package + upload ----------------------------------------
      - name: Package (POSIX)
        if: matrix.os != 'windows-latest'
        run: |
          mkdir -p staging
          if [ "${{ matrix.os }}" = "macos-latest" ] || [ "${{ matrix.os }}" = "macos-13" ]; then
              # macOS: ship a proper .app bundle so the user double-clicks
              # Wacki.app from Finder without seeing a Terminal window.
              # tools/pack-macos-app.sh produces the full
              # Wacki.app/Contents/{Info.plist,MacOS,Resources} tree with
              # the icon, launcher script, and an empty data/ folder for
              # the user's Dane_*.dta files (Resources/data/README.txt
              # explains where to drop them).
              ./tools/pack-macos-app.sh dist/wacki staging/Wacki.app
          else
              cp dist/wacki staging/
          fi
          cp README.md  staging/ 2>/dev/null || true
          tar czf "${{ matrix.artifact }}.tar.gz" -C staging .

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: msys2 {0}
        run: |
          mkdir -p staging
          cp dist/wacki.exe staging/
          cp README.md staging/ 2>/dev/null || true
          (cd staging && zip -r "../${{ matrix.artifact }}.zip" .)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.${{ matrix.archive_ext }}
          if-no-files-found: error

  # ---- Miyoo Mini Plus (and pin-compatible handhelds) -------------
  # Separate job because the build runs entirely inside the
  # union-miyoomini-toolchain Docker image — no host SDL2 build, no
  # per-OS conditionals to thread through the main matrix.
  miyoo:
    name: Miyoo Mini Plus (armv7l)
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Fetch WACKI.EXE
        env:
          WACKI_EXE_URL: ${{ secrets.WACKI_EXE_URL }}
        run: |
          if [ -z "${WACKI_EXE_URL:-}" ]; then
            echo "::error::WACKI_EXE_URL secret is empty"
            exit 1
          fi
          mkdir -p data
          curl -fsSL --retry 3 --retry-delay 2 \
               "$WACKI_EXE_URL" -o data/_wacki_dl
          # The secret URL serves a ZIP containing WACKI.EXE. Sniff the
          # magic bytes (ZIP starts with "PK") and extract the EXE if so;
          # tolerate a raw EXE too in case the URL is ever switched back
          # to an unpacked file. unzip is present on the macOS + Linux
          # runners; 7z is the fallback for Windows Git Bash where unzip
          # isn't guaranteed.
          if [ "$(head -c 2 data/_wacki_dl)" = "PK" ]; then
            echo "[fetch] archive detected — extracting WACKI.EXE"
            mkdir -p data/_unzip
            if command -v unzip >/dev/null 2>&1; then
              unzip -o -q data/_wacki_dl -d data/_unzip
            elif command -v 7z >/dev/null 2>&1; then
              7z x -y -odata/_unzip data/_wacki_dl >/dev/null
            else
              echo "::error::no unzip / 7z available to extract the archive"
              exit 1
            fi
            exe=$(find data/_unzip -iname 'WACKI.EXE' | head -1)
            [ -n "$exe" ] || exe=$(find data/_unzip -iname '*.exe' | head -1)
            if [ -z "$exe" ]; then
              echo "::error::no .exe found inside the downloaded archive"
              find data/_unzip -type f
              exit 1
            fi
            cp "$exe" data/WACKI.EXE
            rm -rf data/_unzip data/_wacki_dl
          else
            mv data/_wacki_dl data/WACKI.EXE
          fi
          ls -la data/WACKI.EXE

      - name: Build engine (Docker / union-miyoomini-toolchain)
        run: |
          ./tools/build-miyoo.sh
          # Docker writes as root-in-container; on Linux runners that
          # leaves the workspace root-owned and the next non-docker
          # step can't create siblings under dist/. Reset ownership.
          sudo chown -R "$USER:$USER" dist src/embedded_wacki_pe.c 2>/dev/null || true

      - name: Strip + log size
        run: |
          # Use the same toolchain image for `strip` so the ARM ELF is
          # parsed correctly (host `strip` rejects unknown arch). Bin
          # isn't in PATH so call by full path; image default keeps
          # in sync with tools/build-miyoo.sh.
          IMG="${MIYOO_DOCKER_IMAGE:-bqcuongas/sdl2-miyoo:latest}"
          before=$(wc -c < dist/wacki-miyoo | tr -d ' ')
          docker run --rm --platform linux/amd64 \
            -v "$PWD:/root/workspace" -w /root/workspace "$IMG" \
            /opt/mmiyoo/bin/arm-linux-gnueabihf-strip --strip-all dist/wacki-miyoo
          sudo chown -R "$USER:$USER" dist 2>/dev/null || true
          after=$(wc -c < dist/wacki-miyoo | tr -d ' ')
          printf '[size] dist/wacki-miyoo: %s -> %s bytes\n' "$before" "$after"
          ls -lh dist/wacki-miyoo

      - name: Package .pak
        run: ./tools/pack-miyoo.sh dist/wacki-miyoo.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wacki-miyoo
          path: dist/wacki-miyoo.zip
          if-no-files-found: error

  # ---- release -----------------------------------------------------
  # Only fires on tag push (`v*`). Pulls the per-platform archives
  # from the matrix build + the Miyoo job and attaches them to a
  # GitHub Release named after the tag.
  release:
    name: GitHub Release
    needs: [build, miyoo]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifact layout
        run: |
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' \) \
                -exec mv {} . \;
          ls -la wacki-*

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            wacki-*.tar.gz
            wacki-*.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
