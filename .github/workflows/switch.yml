name: Switch build

on:
  workflow_dispatch:
  push:
    branches: [ master ]
    paths:
      - 'src/**'
      - 'include/**'
      - 'Makefile'
      - 'tools/**'
      - 'assets/**'
      - '.github/workflows/switch.yml'

jobs:
  build-switch:
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkita64:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sprawdź dostępne portlibs (SDL2 powinno być wbudowane w obraz)
        run: |
          export DEVKITPRO=/opt/devkitpro
          echo "---- pkgconfig dir ----"
          ls -la $DEVKITPRO/portlibs/switch/lib/pkgconfig/ 2>&1 || echo "brak katalogu pkgconfig"
          echo "---- pkg-config --list-all (sdl) ----"
          PKG_CONFIG_PATH=$DEVKITPRO/portlibs/switch/lib/pkgconfig \
            $DEVKITPRO/portlibs/switch/bin/aarch64-none-elf-pkg-config --list-all 2>&1 | grep -i sdl || echo "sdl nie znalezione w pkg-config"

      - name: Sprawdź ikonę .nro
        run: |
          # elf2nro wymaga ikony 256x256 JPEG (assets/icons/wacki-switch.jpg).
          # Nie generujemy tu placeholdera (unikamy dkp-pacman/imagemagick,
          # które triggerują 403 z pkg.devkitpro.org). Jeśli pliku brak,
          # krok "Build" jasno powie "failed to load icon" na elf2nro.
          if [ -f assets/icons/wacki-switch.jpg ]; then
            echo "OK: assets/icons/wacki-switch.jpg istnieje"
            file assets/icons/wacki-switch.jpg || true
          else
            echo "UWAGA: brak assets/icons/wacki-switch.jpg — krok elf2nro w Build prawdopodobnie się wywali"
          fi

      - name: Build (TARGET=switch)
        shell: bash
        run: |
          . /etc/profile.d/devkit-env.sh 2>/dev/null || true
          export DEVKITPRO=/opt/devkitpro
          export DEVKITA64=$DEVKITPRO/devkitA64
          export PATH=$DEVKITA64/bin:$DEVKITPRO/tools/bin:$PATH
          make TARGET=switch
          echo "---- dist after build ----"
          ls -la dist/

      - name: Wgraj artefakt .nro
        uses: actions/upload-artifact@v4
        with:
          name: wacki-switch
          path: dist/wacki.nro
          if-no-files-found: error
