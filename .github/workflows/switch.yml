name: Switch build

on:
  workflow_dispatch:
  push:
    branches: [ master ]
    paths:
      - 'src/**'
      - 'include/**'
      - 'Makefile'
      - 'tools/**'
      - 'assets/**'
      - '.github/workflows/switch.yml'

jobs:
  build-switch:
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkita64:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sprawdź dostępne portlibs (SDL2 powinno być wbudowane w obraz)
        run: |
          export DEVKITPRO=/opt/devkitpro
          echo "---- pkgconfig dir ----"
          ls -la $DEVKITPRO/portlibs/switch/lib/pkgconfig/ 2>&1 || echo "brak katalogu pkgconfig"
          echo "---- pkg-config --list-all (sdl) ----"
          PKG_CONFIG_PATH=$DEVKITPRO/portlibs/switch/lib/pkgconfig \
            $DEVKITPRO/portlibs/switch/bin/aarch64-none-elf-pkg-config --list-all 2>&1 | grep -i sdl || echo "sdl nie znalezione w pkg-config"

      - name: Placeholder ikona .nro (jeśli brak w repo)
        run: |
          # elf2nro wymaga ikony 256x256 JPEG. Jeśli forka jeszcze nie
          # ma assets/icons/wacki-switch.jpg, generujemy prosty
          # placeholder, żeby build nie padał na tym etapie — podmień
          # na właściwą grafikę w repo, jak będzie gotowa.
          if [ ! -f assets/icons/wacki-switch.jpg ]; then
            echo "Brak assets/icons/wacki-switch.jpg — generuję placeholder"
            dkp-pacman -S --noconfirm imagemagick || true
            convert -size 256x256 xc:'#1e2327' assets/icons/wacki-switch.jpg
          fi

      - name: Build (TARGET=switch)
        run: |
          set -x
          . /etc/profile.d/devkit-env.sh 2>/dev/null || true
          export DEVKITPRO=/opt/devkitpro
          export DEVKITA64=$DEVKITPRO/devkitA64
          export PATH=$DEVKITA64/bin:$DEVKITPRO/tools/bin:$PATH
          echo "---- make -n (dry run) ----"
          make TARGET=switch -n || echo "dry run exit: $?"
          echo "---- make -p (vars, grep) ----"
          make TARGET=switch -p -n 2>/dev/null | grep -E '^(BIN_NAME|ENGINE_SRCS|SWITCH_NRO|DIST|TARGET) ' || true
          echo "---- real build ----"
          make TARGET=switch
          echo "make exit code: $?"
          echo "---- dist after build ----"
          ls -la dist/ 2>&1 || echo "still no dist dir"

      - name: Wgraj artefakt .nro
        uses: actions/upload-artifact@v4
        with:
          name: wacki-switch
          path: dist/wacki.nro
          if-no-files-found: error
