name: TEMP - verify other platforms still build

on:
  workflow_dispatch:

jobs:
  desktop-build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Zainstaluj SDL2 dev
        run: |
          sudo apt-get update
          sudo apt-get install -y libsdl2-dev libsdl2-mixer-dev

      - name: Syntax-check naszych zmienionych plikow (nie wymaga WACKI.EXE)
        run: |
          # Pelny `make` (engine) wymaga data/WACKI.EXE do embed-pe-data —
          # tego pliku celowo nie ma w publicznym repo/CI (prawa autorskie).
          # To NIE jest regresja od naszych zmian — identycznie zawiedzie na
          # czystym, niezmodyfikowanym kodzie autora w tym samym CI.
          #
          # Zamiast tego: -fsyntax-only sprawdza, czy nasze zmienione pliki
          # kompiluja sie bez bledow skladniowych/typow, w tym zgodnosc
          # deklaracji cross-file (sdl_internal.h) — bez potrzeby pelnego
          # linkowania.
          gcc -fsyntax-only -Wall -Wextra -Wpedantic \
              -Wno-unused-parameter -Wno-pointer-sign \
              -Wno-language-extension-token -fno-strict-aliasing \
              -std=gnu99 -I include $(sdl2-config --cflags) \
              src/platform/sdl/gamepad_sdl.c \
              src/platform/sdl/system_sdl.c \
              src/platform/sdl/video_sdl.c \
              src/platform/sdl/platform_sdl.c \
              src/config.c

      - name: Testy jednostkowe (nie wymagaja WACKI.EXE)
        run: make test

  portmaster-syntax-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Zainstaluj SDL2 dev
        run: |
          sudo apt-get update
          sudo apt-get install -y libsdl2-dev libsdl2-mixer-dev

      - name: Syntax-check naszych plikow z flagami WACKI_PORTMASTER
        run: |
          # tools/build-portmaster.sh wymaga data/WACKI.EXE (jak kazdy pelny
          # build silnika) — niemozliwe w publicznym CI. Sprawdzamy zamiast
          # tego, czy nasze zmienione pliki kompiluja sie poprawnie z
          # flagami specyficznymi dla PortMastera (gamepad_sdl.c i
          # system_sdl.c sa wspoldzielone z ta platforma).
          gcc -fsyntax-only -Wall -Wextra -Wpedantic \
              -Wno-unused-parameter -Wno-pointer-sign \
              -Wno-language-extension-token -fno-strict-aliasing \
              -DWACKI_HANDHELD -DWACKI_PORTMASTER \
              -std=gnu99 -I include $(sdl2-config --cflags) \
              src/platform/sdl/gamepad_sdl.c \
              src/platform/sdl/system_sdl.c \
              src/platform/sdl/video_sdl.c \
              src/platform/sdl/platform_sdl.c \
              src/config.c

  ps2-syntax-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Zainstaluj SDL2 dev
        run: |
          sudo apt-get update
          sudo apt-get install -y libsdl2-dev libsdl2-mixer-dev

      - name: Syntax-check naszych plikow z flaga WACKI_PS2 (tylko gamepad_sdl.c)
        run: |
          # PS2 ma wlasny system_sdl/video_sdl odpowiednik (ps2/*.c), ale
          # WSPOLDZIELI gamepad_sdl.c (zwykly SDL_GameController) — to jedyny
          # nasz zmieniony plik, ktory PS2 faktycznie linkuje. Sprawdzamy
          # tylko jego, z flaga WACKI_PS2 (Nintendo-layout-detection ma tam
          # gale ifdef __SWITCH__, wiec to scieżka non-Switch generic).
          gcc -fsyntax-only -Wall -Wextra -Wpedantic \
              -Wno-unused-parameter -Wno-pointer-sign \
              -Wno-language-extension-token -fno-strict-aliasing \
              -DWACKI_PS2 \
              -std=gnu99 -I include $(sdl2-config --cflags) \
              src/platform/sdl/gamepad_sdl.c
