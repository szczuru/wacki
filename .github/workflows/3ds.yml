name: Build 3DS

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build-3ds:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        submodules: recursive
    
    - name: Setup Docker
      run: docker pull devkitpro/devkitarm:latest
    
    - name: Download WACKI.EXE (if available)
      if: secrets.WACKI_EXE_URL != ''
      run: |
        mkdir -p data
        curl -L -o data/WACKI.EXE "${{ secrets.WACKI_EXE_URL }}" || true
    
    - name: Build 3DS port
      run: |
        chmod +x tools/build-3ds.sh
        ./tools/build-3ds.sh
    
    - name: Upload 3DS build artifact
      uses: actions/upload-artifact@v3
      with:
        name: wacki-3ds
        path: |
          dist/wacki.3dsx
          dist/wacki.smdh
        if-no-files-found: error
    
    - name: Create release (on tag)
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          dist/wacki.3dsx
          dist/wacki.smdh
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
