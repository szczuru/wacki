baseURL = "https://mszula.github.io/wacki/"
title = "Wacki: Kosmiczna rozgrywka"

# Keep the historical flat URLs: _index.md -> /index.html, stats.md -> /stats.html
# (matches the canonical links and avoids breaking inbound /stats.html links).
uglyURLs = true

# Real <lastmod> in the sitemap, taken from each page's last git commit.
# CI must checkout with fetch-depth: 0 for the full history (see pages.yml).
enableGitInfo = true

# Emit robots.txt (template in layouts/robots.txt).
enableRobotsTXT = true

# Two hand-authored pages — no taxonomies or feeds. Sitemap + robots stay (SEO).
# (enableRobotsTXT above auto-adds the robots output to the home page.)
disableKinds = ["taxonomy", "term", "RSS"]

# Render fenced code blocks as plain <pre><code> (no Chroma syntax colours +
# inline background) so they pick up the themed .prose--guide pre styling
# (ink box, comic border + shadow) instead of a monokai block that clashes.
[markup.highlight]
codeFences = false

[params]
author = "Mateusz Szuła"
description = "Wierny, otwarty port polskiej gry przygodowej Wacki: Kosmiczna rozgrywka (1998). Przejdziesz ją w całości na PC, handheldach i konsolach."
# Single place for the GitHub repo slug — used to build release/download links
# across templates (platform grid, subpages, footer). Change once, not in 12 spots.
repo = "mszula/wacki"

# Cache-buster appended to styles.css/main.js/stats.* — bump on every CSS/JS
# change so browsers (and the local preview) don't serve a stale build.
assetver = "20260622a"

# Where the (1998, out-of-print) game can be downloaded as abandonware. Used by
# the FAQ, the platform-page disc callout and the hub notice so the framing +
# link stay in sync. Change once.
archiveUrl = "https://archive.org/details/wacki_20260611"
