<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>{{ .Title | default site.Title }}</title>
<meta name="author" content="{{ site.Params.author }}" />

{{- /* relURL makes these root-absolute (/wacki/…) so they resolve from any
       page depth — the /platformy/ subpages would otherwise 404 on bare
       relative paths. CSS-internal url() refs are relative to the stylesheet,
       so those stay correct on their own. */ -}}
<link rel="icon" type="image/png" sizes="32x32" href="{{ "assets/favicon-32.png" | relURL }}" />
<link rel="icon" type="image/png" sizes="16x16" href="{{ "assets/favicon-16.png" | relURL }}" />
<link rel="apple-touch-icon" href="{{ "assets/apple-touch-icon.png" | relURL }}" />
<link rel="manifest" href="{{ "site.webmanifest" | relURL }}" />
<meta name="theme-color" content="#e8330d" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link
  href="https://fonts.googleapis.com/css2?family=Bangers&family=Patrick+Hand&family=Nunito:wght@400;600;700;800&display=swap"
  rel="stylesheet"
/>

<link rel="stylesheet" href="{{ "styles.css" | relURL }}?v={{ site.Params.assetver }}" />

<script
  defer
  src="https://bobr.szula.top/tag.js"

></script>
